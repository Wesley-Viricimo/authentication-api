# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Access Token Configuration: Validade de 15 minutos (900000 ms)
api.security.token.secret=52e7bee4c2bbf69a165ea4f12d74625352e7bee4c2bbf69a165ea4f12d746253
api.security.token.expiration=900000

# JWT Refresh Token Configuration: Validade de 7 dias (604800000 ms)
api.security.refresh-token.expiration=604800000

